<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Match & Mint</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <header>
    <h1>🧩 Match & Mint</h1>
    <button id="connect-btn">🔌 Connect Wallet</button>
    <span id="wallet-address"></span>
  </header>

  <section id="instructions">
    <h2>How to Play</h2>
    <ol>
      <li>Connect your wallet (Monad Testnet – chain ID 10143).</li>
      <li>Click “Start Game.”</li>
      <li>Rearrange the puzzle before the timer ends.</li>
      <li>If you finish early, press “Mint Now.”</li>
      <li>If time runs out, you’ll be prompted to mint your snapshot.</li>
    </ol>
  </section>

  <main>
    <button id="start-btn" disabled>🎮 Start Game</button>
    <button id="mint-btn" disabled>🖨 Mint Now</button>
    <p>⏱ Time Left: <span id="timer">45</span>s</p>
    <div id="puzzle-board"></div>
    <img id="sample-image" alt="Puzzle Preview" />
  </main>

  <noscript>
    <p style="color:red;">⚠️ JavaScript is required to play.</p>
  </noscript>

  <script src="script.js"></script>
</body>
</html>
